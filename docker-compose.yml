services:
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://lawtrack_user:lawtrack_pass@postgres:5432/lawtrack
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lawtrack
      POSTGRES_USER: lawtrack_user
      POSTGRES_PASSWORD: lawtrack_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawtrack_user -d lawtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
